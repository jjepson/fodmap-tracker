const SBG = ["#dcfce7","#fef3c7","#fee2e2"];
const ST = ["#15803d","#b45309","#b91c1c"];
const SL = ["Low","Med","High"];

// Unit conversion helpers — convert entered qty to the food's native unit
// Each food's baseQty is in its native unit (cup, oz, g, piece, etc.)
// We store gPerBaseQty and ozPerBaseQty on foods that support weight entry.
// For foods measured by piece/count, only native unit is sensible.

// Conversion: 1 oz = 28.3495 g
const OZ_TO_G = 28.3495;

// Returns qty in the food's native unit given entered value + chosen input unit
function toNativeQty(food, enteredQty, inputUnit) {
  if (inputUnit === "native" || !enteredQty) return enteredQty;
  // We need grams-per-native-unit to convert
  const gpn = food.gramsPerNative; // may be undefined for count-based foods
  if (!gpn) return enteredQty; // fallback: treat as native
  const enteredGrams = inputUnit === "g" ? enteredQty : enteredQty * OZ_TO_G;
  return enteredGrams / gpn;
}

function scoreForQty(food, qty) {
  for (const t of food.thresholds) {
    if (qty <= t.maxQty) return t.score;
  }
  return food.thresholds[food.thresholds.length - 1].score;
}

// Format a qty for display (trim unnecessary decimals)
function fmtQty(n) {
  if (!n && n !== 0) return "";
  const s = parseFloat(n.toFixed(2)).toString();
  return s;
}

function todayKey() { return new Date().toISOString().slice(0,10); }
function formatDate(k) {
  const d = new Date(k+"T12:00:00");
  return d.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});
}
function emptyDay() { return {meals:{Breakfast:[],Lunch:[],Dinner:[],Snacks:[]},symptom:null,notes:""}; }
function dayStats(day) {
  const all = Object.values(day.meals).flat();
  return {
    green:all.filter(f=>f.score===0).length,
    yellow:all.filter(f=>f.score===1).length,
    red:all.filter(f=>f.score===2).length,
    cal:all.reduce((s,f)=>s+Math.round(f.cal*f.servingMult),0),
    total:all.length
  };
}
function loadStatus(s) {
  if (s.red>=2) return "high";
  if (s.red===1||s.yellow>=3) return "moderate";
  return "low";
}

async function loadDays() { try { const r=localStorage.getItem("fodmap-days-v3"); return r?JSON.parse(r):{}; } catch { return {}; } }
async function saveDays(d) { try { localStorage.setItem("fodmap-days-v3",JSON.stringify(d)); } catch {} }
async function loadCustom() { try { const r=localStorage.getItem("fodmap-custom-v3"); return r?JSON.parse(r):[]; } catch { return []; } }
async function saveCustom(d) { try { localStorage.setItem("fodmap-custom-v3",JSON.stringify(d)); } catch {} }
async function loadSavedMeals() { try { const r=localStorage.getItem("fodmap-saved-meals-v3"); return r?JSON.parse(r):[]; } catch { return []; } }
async function saveSavedMeals(d) { try { localStorage.setItem("fodmap-saved-meals-v3",JSON.stringify(d)); } catch {} }

function btnStyle(bg,color,border) {
  return {background:bg,color,border:`1px solid ${border||"transparent"}`,borderRadius:8,padding:"5px 11px",fontSize:12,fontWeight:600,cursor:"pointer"};
}

function FODMAPTrackerV61() {
  const [days,setDays] = useState({});
  const [customFoods,setCustomFoods] = useState([]);
  const [savedMeals,setSavedMeals] = useState([]);
  const [currentDate,setCurrentDate] = useState(todayKey());
  const [tab,setTab] = useState("today");
  const [view,setView] = useState("plan"); // plan | add | symptom | addCustom
  const [activeMeal,setActiveMeal] = useState("Breakfast");
  const [search,setSearch] = useState("");
  const [catFilter,setCatFilter] = useState("All");
  const [loaded,setLoaded] = useState(false);
  const [toast,setToast] = useState(null);
  const [editingItem, setEditingItem] = useState(null); // {meal, uid, enteredQty, inputUnit}
  const [saveMealName,setSaveMealName] = useState("");
  const [saveMealTarget,setSaveMealTarget] = useState(null);
  // Custom food form
  const [cf,setCf] = useState({name:"",category:"Custom",serving:"",baseQty:"1",unit:"serving",cal:"",score:"0"});
  // Pending add — holds food + chosen serving multiplier before confirm
  const [pending,setPending] = useState(null); // {food, multIdx}

  useEffect(()=>{
    (async()=>{
      const [d,c,sm] = await Promise.all([loadDays(),loadCustom(),loadSavedMeals()]);
      setDays(d); setCustomFoods(c); setSavedMeals(sm); setLoaded(true);
    })();
  },[]);

  const showToast = (msg) => { setToast(msg); setTimeout(()=>setToast(null),2200); };

  const day = days[currentDate]||emptyDay();
  const stats = dayStats(day);
  const status = loadStatus(stats);

  const updateDay = (newDay) => {
    const updated = {...days,[currentDate]:newDay};
    setDays(updated); saveDays(updated);
  };

  const allFoods = useMemo(()=>[...FODMAP_DB,...customFoods.map(f=>({...f,custom:true}))]
  ,[customFoods]);

  const categories = useMemo(()=>["All",...Array.from(new Set(allFoods.map(f=>f.category)))]
  ,[allFoods]);

  const filtered = useMemo(()=>allFoods.filter(f=>
    f.name.toLowerCase().includes(search.toLowerCase()) &&
    (catFilter==="All"||f.category===catFilter)
  ),[allFoods,search,catFilter]);

  // Open serving picker — default to base qty in native unit
  const openPending = (food) => {
    setPending({food, enteredQty: String(food.baseQty), inputUnit: "native"});
  };

  const confirmAdd = () => {
    if (!pending) return;
    const {food, enteredQty, inputUnit} = pending;
    const raw = parseFloat(enteredQty);
    if (!raw || raw <= 0) return;
    const nativeQty = toNativeQty(food, raw, inputUnit);
    const mult = nativeQty / food.baseQty;
    const score = scoreForQty(food, nativeQty);
    // Build display label
    let displayServing;
    if (inputUnit === "native") {
      displayServing = `${fmtQty(raw)} ${food.unit}`;
    } else {
      displayServing = `${fmtQty(raw)} ${inputUnit} (${fmtQty(parseFloat(nativeQty.toFixed(2)))} ${food.unit})`;
    }
    const item = {
      ...food,
      servingMult: mult,
      score,
      uid: Date.now()+Math.random(),
      displayServing
    };
    const newDay = {...day, meals:{...day.meals,[activeMeal]:[...day.meals[activeMeal],item]}};
    updateDay(newDay);
    setPending(null);
    setView("plan");
    setSearch("");
    showToast(`Added ${food.name}`);
  };

  const removeFood = (meal,uid) => {
    updateDay({...day,meals:{...day.meals,[meal]:day.meals[meal].filter(f=>f.uid!==uid)}});
  };

  const openEdit = (meal, item) => {
    setEditingItem({meal, uid: item.uid, food: item, enteredQty: String(item.displayServing?.split(' ')[0] || item.baseQty), inputUnit: "native"});
  };

  const confirmEdit = () => {
    if (!editingItem) return;
    const {meal, uid, food, enteredQty, inputUnit} = editingItem;
    const raw = parseFloat(enteredQty);
    if (!raw || raw <= 0) return;
    const nativeQty = toNativeQty(food, raw, inputUnit);
    const mult = nativeQty / food.baseQty;
    const score = scoreForQty(food, nativeQty);
    let displayServing;
    if (inputUnit === "native") {
      displayServing = `${fmtQty(raw)} ${food.unit}`;
    } else {
      displayServing = `${fmtQty(raw)} ${inputUnit} (${fmtQty(parseFloat(nativeQty.toFixed(2)))} ${food.unit})`;
    }
    const updatedItem = {...food, servingMult: mult, score, displayServing, uid};
    const updatedMeal = day.meals[meal].map(f => f.uid === uid ? updatedItem : f);
    updateDay({...day, meals:{...day.meals, [meal]: updatedMeal}});
    setEditingItem(null);
    showToast("Updated ✓");
  };

  const setSymptom = (val) => { updateDay({...day,symptom:val}); setView("plan"); showToast("Symptom logged ✓"); };

  // Custom food save
  const saveCustomFood = () => {
    if (!cf.name.trim()||!cf.serving.trim()||!cf.cal) return;
    const food = {
      id: Date.now(),
      name: cf.name.trim(),
      category: cf.category||"Custom",
      serving: cf.serving.trim(),
      baseQty: parseFloat(cf.baseQty)||1,
      unit: cf.unit||"serving",
      cal: parseInt(cf.cal)||0,
      note: "Custom food",
      thresholds: [{maxQty:99, score:parseInt(cf.score)}],
      custom: true
    };
    const updated = [...customFoods, food];
    setCustomFoods(updated); saveCustom(updated);
    setCf({name:"",category:"Custom",serving:"",baseQty:"1",unit:"serving",cal:"",score:"0"});
    setView("add");
    showToast(`Saved "${food.name}"`);
  };

  const deleteCustomFood = (id) => {
    const updated = customFoods.filter(f=>f.id!==id);
    setCustomFoods(updated); saveCustom(updated);
    showToast("Custom food deleted");

  // Saved meals
  const saveCurrentMeal = (mealName,foods) => {
    if (!saveMealName.trim()||foods.length===0) return;
    const updated = [...savedMeals,{id:Date.now(),name:saveMealName.trim(),foods,mealType:mealName}];
    setSavedMeals(updated); saveSavedMeals(updated);
    setSaveMealName(""); setSaveMealTarget(null);
    showToast(`Saved "${saveMealName.trim()}" ✓`);
  };
  const applySavedMeal = (sm) => {
    const newFoods = sm.foods.map(f=>({...f,uid:Date.now()+Math.random()}));
    const target = sm.mealType||"Breakfast";
    updateDay({...day,meals:{...day.meals,[target]:[...day.meals[target],...newFoods]}});
    showToast(`Added ${sm.name} to ${target}`);
  };
  const deleteSavedMeal = (id) => {
    const updated = savedMeals.filter(m=>m.id!==id);
    setSavedMeals(updated); saveSavedMeals(updated);
  };

  const historyDays = Object.keys(days).filter(k=>dayStats(days[k]).total>0).sort((a,b)=>b.localeCompare(a));
  const statusColor = status==="high"?"#ef4444":status==="moderate"?"#f59e0b":"#22c55e";
  const statusBg = status==="high"?"#fee2e2":status==="moderate"?"#fef3c7":"#dcfce7";
  const isToday = currentDate===todayKey();

  if (!loaded) return <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",fontFamily:"system-ui",color:"#9ca3af",fontSize:14}}>Loading…</div>;

  // ── SERVING PICKER OVERLAY ────────────────────────────────────────────────────
  if (pending) {
    const {food, enteredQty, inputUnit} = pending;
    const raw = parseFloat(enteredQty);
    const validQty = raw && raw > 0;
    const nativeQty = validQty ? toNativeQty(food, raw, inputUnit) : 0;
    const score = validQty ? scoreForQty(food, nativeQty) : food.thresholds[0].score;
    const estCal = validQty ? Math.round(food.cal * (nativeQty / food.baseQty)) : food.cal;
    const hasWeight = !!food.gramsPerNative;

    // Compute equivalent display for reference
    let equivText = "";
    if (validQty && inputUnit !== "native" && hasWeight) {
      equivText = `= ${fmtQty(parseFloat(nativeQty.toFixed(2)))} ${food.unit}`;
    }

    // Safe threshold hint
    const safeThreshold = food.thresholds[0];
    const safeLine = safeThreshold.score === 0
      ? `Safe up to ${fmtQty(safeThreshold.maxQty)} ${food.unit}`

    return (
      <div style={{fontFamily:"system-ui,sans-serif",maxWidth:520,margin:"0 auto",background:"#f8f7f4",minHeight:"100vh"}}>
        <div style={{background:"#fff",borderBottom:"1px solid #e5e7eb",padding:"14px 16px",display:"flex",alignItems:"center",gap:10}}>
          <button onClick={()=>setPending(null)} style={btnStyle("#f3f4f6","#374151")}>← Back</button>
          <span style={{fontWeight:700,fontSize:15,color:"#111"}}>Choose serving size</span>
        </div>
        <div style={{padding:20}}>
          {/* Food info card */}
          <div style={{background:"#fff",borderRadius:14,border:"1px solid #e5e7eb",padding:14,marginBottom:14}}>
            <div style={{fontSize:15,fontWeight:700,color:"#111",marginBottom:3}}>{food.name}</div>
            <div style={{fontSize:12,color:"#6b7280"}}>Reference serving: <strong>{food.serving}</strong></div>
            <div style={{fontSize:12,color:ST[food.thresholds[0].score],marginTop:2}}>{food.note}</div>
            <div style={{fontSize:11,color:"#9ca3af",marginTop:4}}>{safeLine}</div>
          </div>

          {/* Input row */}
          <div style={{background:"#fff",borderRadius:14,border:"1px solid #e5e7eb",padding:16,marginBottom:14}}>
            <div style={{fontSize:13,fontWeight:600,color:"#374151",marginBottom:10}}>How much did she have?</div>
            <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:8}}>
              <input
                type="number"
                min="0"
                step="any"
                value={enteredQty}

                autoFocus
              />
              <select
                value={inputUnit}
                onChange={e=>setPending({...pending, inputUnit:e.target.value, enteredQty: e.target.value==="native" ? String(food.baseQty) : e.target.value==="g" ? String(Math.round(food.baseQty*(food.gramsPerNative||1))) : String(parseFloat(((food.baseQty*(food.gramsPerNative||28.35))/OZ_TO_G).toFixed(1)))})}
                style={{padding:"11px 10px",borderRadius:10,border:"1px solid #d1d5db",fontSize:14,background:"#fff",fontFamily:"inherit",cursor:"pointer"}}
              >
                <option value="native">{food.unit}</option>
                {hasWeight && <option value="g">grams</option>}
                {hasWeight && <option value="oz">oz</option>}
              </select>
            </div>
            {equivText && <div style={{fontSize:12,color:"#6b7280",textAlign:"right",marginBottom:8}}>{equivText}</div>}

            {/* Quick presets */}
            <div style={{fontSize:11,color:"#9ca3af",marginBottom:6}}>Quick amounts:</div>
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {[0.25,0.5,0.75,1,1.5,2].map(mult=>{
                let presetVal, presetLabel;
                if (inputUnit==="native") {
                  presetVal = String(fmtQty(food.baseQty*mult));
                  presetLabel = `${fmtQty(food.baseQty*mult)} ${food.unit}`;
                } else if (inputUnit==="g") {
                  presetVal = String(Math.round(food.baseQty*mult*(food.gramsPerNative||1)));
                  presetLabel = `${presetVal}g`;
                } else {
                  presetVal = String(parseFloat(((food.baseQty*mult*(food.gramsPerNative||28.35))/OZ_TO_G).toFixed(1)));
                  presetLabel = `${presetVal}oz`;
                }
                const pNative = toNativeQty(food, parseFloat(presetVal), inputUnit);
                const pScore = scoreForQty(food, pNative);
                return (
                  <button key={mult} onClick={()=>setPending({...pending, enteredQty:presetVal})}
                    style={{padding:"5px 10px",borderRadius:8,border:`1px solid ${SC[pScore]}`,background:SBG[pScore],
                    fontSize:11,fontWeight:600,color:ST[pScore],cursor:"pointer"}}>
                    {presetLabel}
                  </button>
                );
              })}
            </div>
          </div>

          {/* Result preview */}
          {validQty && (
            <div style={{background:SBG[score],borderRadius:12,padding:"13px 16px",marginBottom:16,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{fontSize:14,fontWeight:700,color:ST[score]}}>{enteredQty} {inputUnit==="native"?food.unit:inputUnit}{equivText?` ${equivText}`:""}</div>
                <div style={{fontSize:12,color:ST[score],marginTop:2}}>{food.note}</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:22,fontWeight:800,color:ST[score]}}>{SL[score]}</div>
                <div style={{fontSize:11,color:ST[score]}}>{estCal} kcal</div>
              </div>
            </div>
          )}

          <button onClick={confirmAdd} disabled={!validQty}
            style={{width:"100%",padding:"14px 0",
            background:validQty?"#16a34a":"#d1d5db",
            color:"#fff",border:"none",borderRadius:12,fontSize:15,fontWeight:700,cursor:validQty?"pointer":"default"}}>
            Add to {activeMeal}
          </button>
        </div>
      </div>
    );
  }

  // ── EDIT ITEM OVERLAY ─────────────────────────────────────────────────────────
  if (editingItem) {
    const {meal, food, enteredQty, inputUnit} = editingItem;
    const raw = parseFloat(enteredQty);
    const validQty = raw && raw > 0;
    const nativeQty = validQty ? toNativeQty(food, raw, inputUnit) : 0;
    const score = validQty ? scoreForQty(food, nativeQty) : food.score;
    const estCal = validQty ? Math.round(food.cal * (nativeQty / food.baseQty)) : food.cal;
    const hasWeight = !!food.gramsPerNative;
    let equivText = "";
    if (validQty && inputUnit !== "native" && hasWeight) {
      equivText = `= ${fmtQty(parseFloat(nativeQty.toFixed(2)))} ${food.unit}`;
    }
    return (
      <div style={{fontFamily:"system-ui,sans-serif",maxWidth:520,margin:"0 auto",background:"#f8f7f4",minHeight:"100vh"}}>
        <div style={{background:"#fff",borderBottom:"1px solid #e5e7eb",padding:"14px 16px",display:"flex",alignItems:"center",gap:10}}>
          <button onClick={()=>setEditingItem(null)} style={btnStyle("#f3f4f6","#374151")}>← Cancel</button>
          <span style={{fontWeight:700,fontSize:15,color:"#111",flex:1}}>Edit serving — {food.name}</span>
        </div>
        <div style={{padding:20}}>
          <div style={{background:"#fff",borderRadius:14,border:"1px solid #e5e7eb",padding:14,marginBottom:14}}>
            <div style={{fontSize:13,color:"#6b7280"}}>Reference serving: <strong>{food.serving}</strong></div>
            <div style={{fontSize:12,color:ST[food.thresholds[0].score],marginTop:2}}>{food.note}</div>
          </div>
          <div style={{background:"#fff",borderRadius:14,border:"1px solid #e5e7eb",padding:16,marginBottom:14}}>
            <div style={{fontSize:13,fontWeight:600,color:"#374151",marginBottom:10}}>New amount</div>
            <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:8}}>
              <input type="number" min="0" step="any" value={enteredQty}
                onChange={e=>setEditingItem({...editingItem, enteredQty:e.target.value})}
                style={{flex:1,padding:"11px 14px",borderRadius:10,border:"1px solid #d1d5db",fontSize:18,fontWeight:600,textAlign:"center",fontFamily:"inherit",outline:"none"}}
                autoFocus />
              <select value={inputUnit}
                onChange={e=>setEditingItem({...editingItem, inputUnit:e.target.value,
                  enteredQty: e.target.value==="native" ? String(food.baseQty)
                    : e.target.value==="g" ? String(Math.round(food.baseQty*(food.gramsPerNative||1)))
                    : String(parseFloat(((food.baseQty*(food.gramsPerNative||28.35))/OZ_TO_G).toFixed(1)))})}
                style={{padding:"11px 10px",borderRadius:10,border:"1px solid #d1d5db",fontSize:14,background:"#fff",fontFamily:"inherit",cursor:"pointer"}}>
                <option value="native">{food.unit}</option>
                {hasWeight && <option value="g">grams</option>}
                {hasWeight && <option value="oz">oz</option>}
              </select>
            </div>
            {equivText && <div style={{fontSize:12,color:"#6b7280",textAlign:"right",marginBottom:8}}>{equivText}</div>}
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {[0.25,0.5,0.75,1,1.5,2].map(mult=>{
                let presetVal;
                if (inputUnit==="native") presetVal = String(fmtQty(food.baseQty*mult));
                else if (inputUnit==="g") presetVal = String(Math.round(food.baseQty*mult*(food.gramsPerNative||1)));
                else presetVal = String(parseFloat(((food.baseQty*mult*(food.gramsPerNative||28.35))/OZ_TO_G).toFixed(1)));
                const pNative = toNativeQty(food, parseFloat(presetVal), inputUnit);
                const pScore = scoreForQty(food, pNative);
                return (
                  <button key={mult} onClick={()=>setEditingItem({...editingItem, enteredQty:presetVal})}
                    style={{padding:"5px 10px",borderRadius:8,border:`1px solid ${SC[pScore]}`,background:SBG[pScore],fontSize:11,fontWeight:600,color:ST[pScore],cursor:"pointer"}}>
                    {presetVal}{inputUnit==="native"?` ${food.unit}`:inputUnit==="g"?"g":"oz"}
                  </button>
                );
              })}
            </div>
          </div>
          {validQty && (
            <div style={{background:SBG[score],borderRadius:12,padding:"13px 16px",marginBottom:16,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={{fontSize:14,fontWeight:700,color:ST[score]}}>{enteredQty} {inputUnit==="native"?food.unit:inputUnit}{equivText?` ${equivText}`:""}</div>
                <div style={{fontSize:12,color:ST[score],marginTop:2}}>{food.note}</div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:22,fontWeight:800,color:ST[score]}}>{SL[score]}</div>
                <div style={{fontSize:11,color:ST[score]}}>{estCal} kcal</div>
              </div>
            </div>
          )}
          <div style={{display:"flex",gap:10}}>
            <button onClick={confirmEdit} disabled={!validQty}
              style={{flex:1,padding:"13px 0",background:validQty?"#16a34a":"#d1d5db",color:"#fff",border:"none",borderRadius:12,fontSize:15,fontWeight:700,cursor:validQty?"pointer":"default"}}>
              Save changes
            </button>
            <button onClick={()=>{removeFood(editingItem.meal, editingItem.uid); setEditingItem(null); showToast("Removed");}}
              style={{padding:"13px 18px",background:"#fee2e2",color:"#b91c1c",border:"1px solid #fca5a5",borderRadius:12,fontSize:14,fontWeight:600,cursor:"pointer"}}>
              Remove

          </div>
        </div>
      </div>

  if (view==="addCustom") return (

        {[
          ["Food name","text","name","e.g. My protein bar"],
          ["Serving description","text","serving","e.g. 1 bar (45g)"],

          <div style={{display:"flex",gap:8}}>
            {[[0,"Low","#dcfce7","#15803d"],[1,"Med","#fef3c7","#b45309"],[2,"High","#fee2e2","#b91c1c"]].map(([v,l,bg,col])=>(
              <button key={v} onClick={()=>setCf({...cf,score:String(v)})} style={{
                flex:1,padding:"10px 0",borderRadius:10,border:`2px solid ${cf.score==v?col:"#e5e7eb"}`,

            ))}
          </div>
        </div>

          style={{width:"100%",padding:"13px 0",background:(!cf.name.trim()||!cf.serving.trim()||!cf.cal)?"#d1d5db":"#16a34a",

          Save food
        </button>

          <div style={{marginTop:24}}>
            <div style={{fontSize:13,fontWeight:700,color:"#374151",marginBottom:10}}>Your custom foods</div>
            {customFoods.map(f=>(
              <div key={f.id} style={{background:"#fff",borderRadius:10,border:"1px solid #e5e7eb",padding:"10px 12px",marginBottom:8,display:"flex",alignItems:"center",gap:10}}>
                <span style={{width:9,height:9,borderRadius:"50%",background:SC[f.thresholds[0].score],display:"inline-block",flexShrink:0}}/>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,fontWeight:600,color:"#111"}}>{f.name}</div>
                  <div style={{fontSize:11,color:"#9ca3af"}}>{f.serving} · {f.cal} kcal · {f.category}</div>
                </div>
                <button onClick={()=>deleteCustomFood(f.id)} style={btnStyle("#fee2e2","#b91c1c","#fca5a5")}>✕</button>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );

  // ── ADD FOOD VIEW ─────────────────────────────────────────────────────────────
  if (view==="add") return (
    <div style={{fontFamily:"system-ui,sans-serif",maxWidth:520,margin:"0 auto",background:"#f8f7f4",minHeight:"100vh",paddingBottom:32}}>
      <div style={{background:"#fff",borderBottom:"1px solid #e5e7eb",padding:"14px 16px",display:"flex",alignItems:"center",gap:10,position:"sticky",top:0,zIndex:10}}>
        <button onClick={()=>{setView("plan");setSearch("");}} style={btnStyle("#f3f4f6","#374151")}>← Back</button>
        <span style={{fontWeight:700,fontSize:15,color:"#111",flex:1}}>Add to {activeMeal}</span>
        <button onClick={()=>setView("addCustom")} style={btnStyle("#f0fdf4","#16a34a","#86efac")}>+ Custom</button>
      </div>
      <div style={{padding:"12px 16px 0"}}>
        <input type="text" placeholder="Search 139+ foods…" value={search} onChange={e=>setSearch(e.target.value)}
          style={{width:"100%",boxSizing:"border-box",padding:"10px 14px",borderRadius:10,border:"1px solid #d1d5db",fontSize:14,background:"#fff",outline:"none",marginBottom:10}} autoFocus/>
        <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:10,scrollbarWidth:"none"}}>
          {categories.map(cat=>(
            <button key={cat} onClick={()=>setCatFilter(cat)} style={{
              flexShrink:0,padding:"5px 12px",borderRadius:20,border:"1px solid",
              fontSize:12,fontWeight:500,cursor:"pointer",
              background:catFilter===cat?"#16a34a":"#fff",
              color:catFilter===cat?"#fff":"#374151",
              borderColor:catFilter===cat?"#16a34a":"#d1d5db"
            }}>{cat}</button>
          ))}
        </div>
        <div style={{background:"#fff",borderRadius:14,border:"1px solid #e5e7eb",overflow:"hidden"}}>
          {filtered.length===0
            ? <div style={{padding:20,textAlign:"center"}}>
                <div style={{fontSize:13,color:"#9ca3af",marginBottom:12}}>No foods match "{search}"</div>
                <a href="https://www.monashfodmap.com/ibs-central/i-have-ibs/get-the-app/" target="_blank" rel="noopener noreferrer"
                  style={{display:"inline-block",padding:"9px 16px",background:"#f0fdf4",border:"1px solid #86efac",borderRadius:10,fontSize:13,fontWeight:600,color:"#16a34a",textDecoration:"none"}}>
                  🔍 Check Monash app for "{search}"
                </a>
                <div style={{marginTop:8,fontSize:11,color:"#9ca3af"}}>Or add it as a Custom food using the + Custom button above</div>
              </div>
            : <>
                {filtered.map((f,i)=>(
                  <div key={f.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",borderTop:i>0?"1px solid #f3f4f6":"none"}}>
                    <span style={{width:11,height:11,borderRadius:"50%",background:SC[f.score],flexShrink:0,display:"inline-block"}}/>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:13,fontWeight:600,color:"#111",display:"flex",alignItems:"center",gap:5}}>
                        {f.name}
                        {f.custom&&<span style={{fontSize:10,background:"#f0fdf4",color:"#16a34a",padding:"1px 5px",borderRadius:5,fontWeight:600}}>custom</span>}
                      </div>
                      <div style={{fontSize:11,color:"#9ca3af"}}>{f.serving} · {f.cal} kcal</div>
                      <div style={{fontSize:11,color:ST[f.score]}}>{f.note}</div>
                    </div>
                    <button onClick={()=>openPending(f)} style={btnStyle("#f0fdf4","#16a34a","#86efac")}>Add</button>
                  </div>
                ))}
                {search.length > 0 && (
                  <div style={{padding:"10px 14px",borderTop:"1px solid #f3f4f6",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                    <span style={{fontSize:12,color:"#9ca3af"}}>Not seeing it?</span>
                    <a href="https://www.monashfodmap.com/ibs-central/i-have-ibs/get-the-app/" target="_blank" rel="noopener noreferrer"
                      style={{fontSize:12,fontWeight:600,color:"#16a34a",textDecoration:"none"}}>Check Monash app →</a>
                  </div>
                )}
              </>
          }
        </div>
        <div style={{marginTop:10,fontSize:11,color:"#9ca3af",textAlign:"center"}}>300+ foods from Monash University & FODMAP Friendly research · Tap Add to choose serving size</div>
      </div>
    </div>
  );

  // ── SYMPTOM VIEW ──────────────────────────────────────────────────────────────
  if (view==="symptom") return (
    <div style={{fontFamily:"system-ui,sans-serif",maxWidth:520,margin:"0 auto",background:"#f8f7f4",minHeight:"100vh"}}>
      <div style={{background:"#fff",borderBottom:"1px solid #e5e7eb",padding:"14px 16px",display:"flex",alignItems:"center",gap:10}}>
        <button onClick={()=>setView("plan")} style={btnStyle("#f3f4f6","#374151")}>← Back</button>
        <span style={{fontWeight:700,fontSize:15,color:"#111"}}>How did you feel today?</span>
      </div>
      <div style={{padding:20}}>
        <p style={{fontSize:13,color:"#6b7280",marginTop:0}}>Rate gut symptoms for {formatDate(currentDate)}.</p>
        <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:16}}>
          {SYMPTOM_LABELS.map((label,i)=>(
            <button key={i} onClick={()=>setSymptom(i+1)} style={{
              padding:"13px 18px",borderRadius:12,
              border:`2px solid ${day.symptom===i+1?"#16a34a":"#e5e7eb"}`,
              background:day.symptom===i+1?"#f0fdf4":"#fff",
              fontSize:15,fontWeight:600,color:day.symptom===i+1?"#15803d":"#374151",
              cursor:"pointer",textAlign:"left"
            }}>{label}</button>
          ))}
        </div>
        <textarea placeholder="Notes (bloating after lunch, felt fine all day…)"
          value={day.notes} onChange={e=>updateDay({...day,notes:e.target.value})}
          style={{width:"100%",boxSizing:"border-box",padding:"10px 14px",borderRadius:10,border:"1px solid #d1d5db",fontSize:13,minHeight:80,resize:"vertical",fontFamily:"inherit"}}/>
      </div>
    </div>
  );

  // ── MAIN ──────────────────────────────────────────────────────────────────────
  return (
    <div style={{fontFamily:"system-ui,sans-serif",maxWidth:520,margin:"0 auto",background:"#f8f7f4",minHeight:"100vh",paddingBottom:80}}>
      {toast&&<div style={{position:"fixed",top:16,left:"50%",transform:"translateX(-50%)",background:"#1a1a1a",color:"#fff",padding:"8px 18px",borderRadius:20,fontSize:13,fontWeight:500,zIndex:100,whiteSpace:"nowrap"}}>{toast}</div>}

      {/* Header */}
      <div style={{background:"#fff",borderBottom:"1px solid #e5e7eb",padding:"14px 16px 12px",position:"sticky",top:0,zIndex:10}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:20}}>🌿</span>
            <span style={{fontSize:17,fontWeight:700,color:"#1a1a1a",letterSpacing:-0.3}}>FODMAP Tracker</span>
          </div>
          {tab==="today"&&(
            <div style={{display:"flex",gap:4,alignItems:"center"}}>
              <button onClick={()=>{const d=new Date(currentDate+"T12:00:00");d.setDate(d.getDate()-1);setCurrentDate(d.toISOString().slice(0,10));}}
                style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:"#6b7280",padding:"0 4px"}}>‹</button>
              <span style={{fontSize:12,fontWeight:600,color:"#374151",minWidth:82,textAlign:"center"}}>{isToday?"Today":formatDate(currentDate)}</span>
              <button onClick={()=>{const d=new Date(currentDate+"T12:00:00");d.setDate(d.getDate()+1);const next=d.toISOString().slice(0,10);if(next<=todayKey())setCurrentDate(next);}}
                disabled={currentDate>=todayKey()}
                style={{background:"none",border:"none",fontSize:20,cursor:"pointer",color:currentDate>=todayKey()?"#d1d5db":"#6b7280",padding:"0 4px"}}>›</button>
            </div>
          )}
        </div>
        <div style={{display:"flex",gap:4,marginTop:10}}>
          {[["today","📋 Log"],["history","📅 History"],["saved","⭐ Saved"]].map(([t,label])=>(
            <button key={t} onClick={()=>setTab(t)} style={{flex:1,padding:"6px 0",borderRadius:8,border:"none",cursor:"pointer",fontSize:12,fontWeight:600,background:tab===t?"#16a34a":"#f3f4f6",color:tab===t?"#fff":"#6b7280"}}>{label}</button>
          ))}
        </div>
      </div>

      {/* TODAY */}
      {tab==="today"&&<>
        <div style={{margin:"12px 14px 0",background:"#fff",borderRadius:14,padding:"12px 14px",border:"1px solid #e5e7eb"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
            <span style={{fontSize:13,fontWeight:700,color:"#374151"}}>Daily FODMAP Load</span>
            <span style={{fontSize:11,fontWeight:700,padding:"3px 10px",borderRadius:20,background:statusBg,color:statusColor}}>
              {status==="high"?"⚠️ Too high":status==="moderate"?"⚡ Moderate":"✓ Safe"}
            </span>
          </div>
          <div style={{display:"flex",gap:8}}>
            {[["🟢",stats.green,"Low","#dcfce7","#15803d"],["🟡",stats.yellow,"Med","#fef3c7","#b45309"],["🔴",stats.red,"High","#fee2e2","#b91c1c"],["🔥",stats.cal,"kcal","#f3f4f6","#374151"]].map(([e,v,l,bg,c])=>(
              <div key={l} style={{flex:1,background:bg,borderRadius:10,padding:"7px 4px",textAlign:"center"}}>
                <div style={{fontSize:16}}>{e}</div>
                <div style={{fontSize:18,fontWeight:700,color:c,lineHeight:1.1}}>{v}</div>
                <div style={{fontSize:10,color:c,fontWeight:500}}>{l}</div>
              </div>
            ))}
          </div>
          {status==="high"&&<div style={{marginTop:8,padding:"7px 10px",background:"#fee2e2",borderRadius:8,fontSize:12,color:"#b91c1c"}}>⚠️ {stats.red} high-FODMAP items — consider swapping one out.</div>}
          {status==="moderate"&&<div style={{marginTop:8,padding:"7px 10px",background:"#fef3c7",borderRadius:8,fontSize:12,color:"#b45309"}}>Space high-FODMAP foods across different meals.</div>}
          <div style={{marginTop:10,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontSize:12,color:"#6b7280"}}>{day.symptom?`Feeling: ${SYMPTOM_LABELS[day.symptom-1]}`:"No symptom logged"}</span>
            <button onClick={()=>setView("symptom")} style={btnStyle("#f3f4f6","#374151")}>{day.symptom?"Edit":"Log how I feel"}</button>
          </div>
        </div>

        <div style={{padding:"12px 14px 0"}}>
          {MEALS.map(meal=>(
            <div key={meal} style={{background:"#fff",borderRadius:14,border:"1px solid #e5e7eb",marginBottom:10,overflow:"hidden"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"11px 14px 9px"}}>
                <span style={{fontWeight:700,fontSize:14,color:"#1a1a1a"}}>{MEAL_ICONS[meal]} {meal}</span>
                <div style={{display:"flex",gap:6}}>
                  {day.meals[meal].length>0&&(
                    saveMealTarget===meal
                      ? <div style={{display:"flex",gap:5,alignItems:"center"}}>
                          <input value={saveMealName} onChange={e=>setSaveMealName(e.target.value)} placeholder="Name…"
                            style={{padding:"4px 8px",borderRadius:7,border:"1px solid #d1d5db",fontSize:12,width:100}}/>
                          <button onClick={()=>saveCurrentMeal(meal,day.meals[meal])} style={btnStyle("#f0fdf4","#16a34a","#86efac")}>Save</button>
                          <button onClick={()=>setSaveMealTarget(null)} style={btnStyle("#f3f4f6","#6b7280")}>✕</button>
                        </div>
                      : <button onClick={()=>{setSaveMealTarget(meal);setSaveMealName("");}} style={btnStyle("#fef9c3","#b45309","#fde68a")} title="Save meal">⭐</button>
                  )}
                  <button onClick={()=>{setActiveMeal(meal);setView("add");}} style={btnStyle("#f0fdf4","#16a34a","#86efac")}>+ Add</button>
                </div>
              </div>
              {day.meals[meal].length===0
                ? <div style={{padding:"0 14px 11px",fontSize:12,color:"#9ca3af",fontStyle:"italic"}}>Nothing added yet</div>
                : <div style={{padding:"0 10px 10px"}}>
                    {day.meals[meal].map(f=>(
                      <div key={f.uid} style={{display:"flex",alignItems:"center",gap:8,padding:"6px 4px",borderTop:"1px solid #f3f4f6"}}>
                        <span style={{width:9,height:9,borderRadius:"50%",background:SC[f.score],flexShrink:0,display:"inline-block"}}/>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:13,fontWeight:500,color:"#111",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{f.name}</div>
                          <div style={{fontSize:11,color:"#9ca3af"}}>{f.displayServing||f.serving} · {Math.round(f.cal*f.servingMult)} kcal</div>
                        </div>
                        <span style={{fontSize:10,fontWeight:600,padding:"2px 7px",borderRadius:10,background:SBG[f.score],color:ST[f.score]}}>{SL[f.score]}</span>
                        <button onClick={()=>openEdit(meal,f)} style={{background:"none",border:"none",color:"#9ca3af",cursor:"pointer",fontSize:14,padding:"0 3px"}} title="Edit serving">✏️</button>
                        <button onClick={()=>removeFood(meal,f.uid)} style={{background:"none",border:"none",color:"#d1d5db",cursor:"pointer",fontSize:17,padding:"0 2px"}} title="Remove">×</button>
                      </div>
                    ))}
                  </div>
              }
            </div>
          ))}
        </div>

        <div style={{margin:"0 14px 16px",padding:"11px 14px",background:"#fff",borderRadius:14,border:"1px solid #e5e7eb"}}>
          <div style={{fontSize:12,fontWeight:700,color:"#374151",marginBottom:6}}>FODMAP key</div>
          <div style={{fontSize:12,color:"#6b7280",lineHeight:1.8}}>
            <span style={{color:"#15803d",fontWeight:600}}>● Low</span> — Safe at listed serving &nbsp;
            <span style={{color:"#b45309",fontWeight:600}}>● Med</span> — Small amounts OK &nbsp;
            <span style={{color:"#b91c1c",fontWeight:600}}>● High</span> — Max 1/day · Serving size changes the score
          </div>
        </div>
      </>}

      {/* HISTORY */}
      {tab==="history"&&<div style={{padding:"12px 14px"}}>
        <p style={{fontSize:13,color:"#6b7280",marginTop:4,marginBottom:12}}>Tap a day to review it.</p>
        {historyDays.length===0
          ? <div style={{padding:30,textAlign:"center",color:"#9ca3af",fontSize:13}}>No days logged yet.</div>
          : historyDays.map(key=>{
              const s=dayStats(days[key]);
              const st=loadStatus(s);
              const stColor=st==="high"?"#ef4444":st==="moderate"?"#f59e0b":"#22c55e";
              const stBg=st==="high"?"#fee2e2":st==="moderate"?"#fef3c7":"#dcfce7";
              return (
                <div key={key} onClick={()=>{setCurrentDate(key);setTab("today");}}
                  style={{background:"#fff",borderRadius:14,border:"1px solid #e5e7eb",padding:"12px 14px",marginBottom:8,cursor:"pointer",display:"flex",alignItems:"center",gap:12}}>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:700,color:"#111"}}>{key===todayKey()?"Today":formatDate(key)}</div>
                    <div style={{fontSize:12,color:"#6b7280",marginTop:2}}>
                      🟢{s.green} 🟡{s.yellow} 🔴{s.red} · {s.cal} kcal
                      {days[key].symptom?` · ${SYMPTOM_LABELS[days[key].symptom-1]}`:""}
                    </div>
                    {days[key].notes&&<div style={{fontSize:11,color:"#9ca3af",marginTop:3,fontStyle:"italic"}}>{days[key].notes.slice(0,60)}{days[key].notes.length>60?"…":""}</div>}
                  </div>
                  <span style={{fontSize:11,fontWeight:700,padding:"3px 10px",borderRadius:20,background:stBg,color:stColor,flexShrink:0}}>
                    {st==="high"?"High":st==="moderate"?"Moderate":"Safe"}
                  </span>
                </div>
              );
            })
        }
      </div>}

      {/* SAVED */}
      {tab==="saved"&&<div style={{padding:"12px 14px"}}>
        <p style={{fontSize:13,color:"#6b7280",marginTop:4,marginBottom:12}}>Tap ⭐ on any meal in the Log to save it here for quick re-use.</p>
        {savedMeals.length===0
          ? <div style={{padding:30,textAlign:"center",color:"#9ca3af",fontSize:13}}>No saved meals yet.</div>
          : savedMeals.map(sm=>{
              const ss={green:sm.foods.filter(f=>f.score===0).length,yellow:sm.foods.filter(f=>f.score===1).length,red:sm.foods.filter(f=>f.score===2).length,cal:sm.foods.reduce((s,f)=>s+Math.round(f.cal*(f.servingMult||1)),0)};
              return (
                <div key={sm.id} style={{background:"#fff",borderRadius:14,border:"1px solid #e5e7eb",padding:"12px 14px",marginBottom:8}}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
                    <div>
                      <div style={{fontSize:14,fontWeight:700,color:"#111"}}>{sm.name}</div>
                      <div style={{fontSize:11,color:"#9ca3af"}}>Usually: {sm.mealType} · {sm.foods.length} items · {ss.cal} kcal</div>
                    </div>
                    <div style={{display:"flex",gap:6}}>
                      <button onClick={()=>applySavedMeal(sm)} style={btnStyle("#f0fdf4","#16a34a","#86efac")}>+ Add</button>
                      <button onClick={()=>deleteSavedMeal(sm.id)} style={btnStyle("#fee2e2","#b91c1c","#fca5a5")}>✕</button>
                    </div>
                  </div>
                  <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
                    {sm.foods.map((f,i)=>(
                      <span key={i} style={{fontSize:11,padding:"2px 8px",borderRadius:10,background:SBG[f.score],color:ST[f.score],fontWeight:500}}>{f.name}</span>
                    ))}
                  </div>
                </div>
              );
            })
        }
      </div>}
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<FODMAPTrackerV61 />);
  </script>
</body>
</html>
